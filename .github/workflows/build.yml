name: Build FakeNetType APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download or create XposedBridgeAPI.jar
      run: |
        mkdir -p app/libs

        # Try multiple download sources for XposedBridge API
        curl -sL "https://github.com/LSPosed/LSPosed.github.io/raw/main/art/build/82/XposedBridgeApi.jar" -o app/libs/XposedBridgeAPI.jar 2>/dev/null || true
        if [ ! -s app/libs/XposedBridgeAPI.jar ]; then
          curl -sL "https://github.com/rovo89/XposedBridge/raw/art/api/90/XposedBridgeApi.jar" -o app/libs/XposedBridgeAPI.jar 2>/dev/null || true
        fi
        if [ ! -s app/libs/XposedBridgeAPI.jar ]; then
          curl -sL "https://github.com/rovo89/XposedBridge/raw/master/art/api/90/XposedBridgeApi.jar" -o app/libs/XposedBridgeAPI.jar 2>/dev/null || true
        fi

        # Validate it's actually a JAR/ZIP
        file app/libs/XposedBridgeAPI.jar | grep -i "zip" && echo "Valid JAR downloaded" || {
          echo "All downloads failed, creating stub JAR..."
          rm -f app/libs/XposedBridgeAPI.jar

          # Create minimal stub source
          mkdir -p stub_src/de/robv/android/xposed stub_src/de/robv/android/xposed/callbacks

          cat > stub_src/de/robv/android/xposed/IXposedHookLoadPackage.java << 'EOF'
package de.robv.android.xposed;
public interface IXposedHookLoadPackage {
    void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable;
}
EOF

          cat > stub_src/de/robv/android/xposed/XC_LoadPackage.java << 'EOF'
package de.robv.android.xposed;
public class XC_LoadPackage {
    public static class LoadPackageParam {
        public String packageName;
        public ClassLoader classLoader;
        public Object appInfo;
        public Object loadedApk;
    }
}
EOF

          cat > stub_src/de/robv/android/xposed/XC_MethodHook.java << 'EOF'
package de.robv.android.xposed;
public abstract class XC_MethodHook {
    public static class MethodHookParam {
        public Object thisObject;
        public Object[] args;
        public Object result;
        public Throwable throwable;
        public Object getResult() { return result; }
        public void setResult(Object r) { result = r; }
        public Throwable getThrowable() { return throwable; }
        public void setThrowable(Throwable t) { throwable = t; }
    }
    protected void beforeHookedMethod(MethodHookParam param) throws Throwable {}
    protected void afterHookedMethod(MethodHookParam param) throws Throwable {}
}
EOF

          cat > stub_src/de/robv/android/xposed/XposedBridge.java << 'EOF'
package de.robv.android.xposed;
public class XposedBridge {
    public static void log(String msg) { System.out.println("[Xposed] " + msg); }
    public static Object invokeOriginalMethod(Object method, Object thisObject, Object[] args) throws Throwable { return null; }
}
EOF

          cat > stub_src/de/robv/android/xposed/XposedHelpers.java << 'EOF'
package de.robv.android.xposed;
import java.lang.reflect.*;
public class XposedHelpers {
    public static Object getObjectField(Object obj, String field) {
        try { Field f = obj.getClass().getDeclaredField(field); f.setAccessible(true); return f.get(obj); } catch (Exception e) { return null; }
    }
    public static void setObjectField(Object obj, String field, Object value) {
        try { Field f = obj.getClass().getDeclaredField(field); f.setAccessible(true); f.set(obj, value); } catch (Exception ignored) {}
    }
    public static void setIntField(Object obj, String field, int value) {
        try { Field f = obj.getClass().getDeclaredField(field); f.setAccessible(true); f.setInt(obj, value); } catch (Exception ignored) {}
    }
    public static void setBooleanField(Object obj, String field, boolean value) {
        try { Field f = obj.getClass().getDeclaredField(field); f.setAccessible(true); f.setBoolean(obj, value); } catch (Exception ignored) {}
    }
    public static Object callMethod(Object obj, String method, Object... args) {
        try { for (Method m : obj.getClass().getDeclaredMethods()) { if (m.getName().equals(method) && m.getParameterCount() == args.length) { m.setAccessible(true); return m.invoke(obj, args); } } } catch (Exception ignored) {}
        return null;
    }
    public static Object callStaticMethod(Class<?> clazz, String method, Object... args) {
        try { for (Method m : clazz.getDeclaredMethods()) { if (m.getName().equals(method) && m.getParameterCount() == args.length) { m.setAccessible(true); return m.invoke(null, args); } } } catch (Exception ignored) {}
        return null;
    }
    public static Class<?> findClass(String className, ClassLoader cl) {
        try { return Class.forName(className, false, cl); } catch (Exception e) { return null; }
    }
    public static Object newInstance(Class<?> clazz, Object... args) {
        try { for (Constructor<?> c : clazz.getDeclaredConstructors()) { if (c.getParameterCount() == args.length) { c.setAccessible(true); return c.newInstance(args); } } } catch (Exception ignored) {}
        return null;
    }
    public static Object findAndHookMethod(Class<?> clazz, String methodName, Object... paramTypes) { return null; }
}
EOF

          cat > stub_src/de/robv/android/xposed/XSharedPreferences.java << 'EOF'
package de.robv.android.xposed;
import android.content.SharedPreferences;
import java.util.Set;
public class XSharedPreferences implements SharedPreferences {
    public XSharedPreferences(String pkg, String name) {}
    public void makeWorldReadable() {}
    public void reload() {}
    public String getString(String k, String d) { return d; }
    public int getInt(String k, int d) { return d; }
    public boolean getBoolean(String k, boolean d) { return d; }
    public long getLong(String k, long d) { return d; }
    public float getFloat(String k, float d) { return d; }
    public Set<String> getStringSet(String k, Set<String> d) { return d; }
    public boolean contains(String k) { return false; }
    public SharedPreferences.Editor edit() { return new SharedPreferences.Editor() {
        public SharedPreferences.Editor putString(String k, String v) { return this; }
        public SharedPreferences.Editor putInt(String k, int v) { return this; }
        public SharedPreferences.Editor putBoolean(String k, boolean v) { return this; }
        public SharedPreferences.Editor putLong(String k, long v) { return this; }
        public SharedPreferences.Editor putFloat(String k, float v) { return this; }
        public SharedPreferences.Editor putStringSet(String k, Set<String> v) { return this; }
        public SharedPreferences.Editor remove(String k) { return this; }
        public SharedPreferences.Editor clear() { return this; }
        public boolean commit() { return true; }
        public void apply() {}
    }; }
    public void registerOnSharedPreferenceChangeListener(SharedPreferences.OnSharedPreferenceChangeListener l) {}
    public void unregisterOnSharedPreferenceChangeListener(SharedPreferences.OnSharedPreferenceChangeListener l) {}
}
EOF

          cat > stub_src/de/robv/android/xposed/callbacks/package-info.java << 'EOF'
package de.robv.android.xposed.callbacks;
EOF

          # Compile and create JAR
          OUT=stub_out && mkdir -p $OUT
          javac -d $OUT stub_src/de/robv/android/xposed/*.java stub_src/de/robv/android/xposed/callbacks/*.java 2>&1
          jar cf app/libs/XposedBridgeAPI.jar -C $OUT de 2>&1
          echo "Stub JAR created"
        fi
        ls -la app/libs/
        file app/libs/XposedBridgeAPI.jar

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Debug)
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: FakeNetType-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
