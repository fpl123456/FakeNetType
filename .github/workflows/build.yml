name: Build FakeNetType APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download or create XposedBridgeAPI.jar
      run: |
        mkdir -p app/libs
        # Try official XposedBridge repo first
        curl -sL "https://github.com/rovo89/XposedBridge/raw/art/api/82/XposedBridgeApi.jar" -o app/libs/XposedBridgeAPI.jar
        # If download fails or file is too small, create stub
        if [ ! -s app/libs/XposedBridgeAPI.jar ]; then
          curl -sL "https://github.com/rovo89/XposedBridge/raw/master/api/82/XposedBridgeApi.jar" -o app/libs/XposedBridgeAPI.jar
        fi
        if [ ! -s app/libs/XposedBridgeAPI.jar ]; then
          # Create a minimal stub JAR for compilation
          mkdir -p stub/de/robv/android/xposed
          echo "package de.robv.android.xposed;" > stub/de/robv/android/xposed/IXposedHookLoadPackage.java
          echo "public interface IXposedHookLoadPackage { void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable; }" >> stub/de/robv/android/xposed/IXposedHookLoadPackage.java
          echo "package de.robv.android.xposed;" > stub/de/robv/android/xposed/XC_LoadPackage.java
          echo "public class XC_LoadPackage { public static class LoadPackageParam { public String packageName; public Object appInfo; public Object loadedApk; } }" >> stub/de/robv/android/xposed/XC_LoadPackage.java
          echo "package de.robv.android.xposed;" > stub/de/robv/android/xposed/XC_MethodHook.java
          echo "public abstract class XC_MethodHook { protected void beforeHookedMethod(MethodHookParam param) throws Throwable {} protected void afterHookedMethod(MethodHookParam param) throws Throwable {} public static class MethodHookParam { public Object thisObject; public Object[] args; public Object result; public Object getResult() { return result; } public void setResult(Object r) { result = r; } } }" >> stub/de/robv/android/xposed/XC_MethodHook.java
          echo "package de.robv.android.xposed;" > stub/de/robv/android/xposed/XposedBridge.java
          echo "public class XposedBridge { public static void log(String msg) { System.out.println(msg); } public static Object invokeOriginalMethod(Object method, Object thisObject, Object[] args) { return null; } }" >> stub/de/robv/android/xposed/XposedBridge.java
          echo "package de.robv.android.xposed;" > stub/de/robv/android/xposed/XposedHelpers.java
          echo "public class XposedHelpers { public static Object getObjectField(Object obj, String field) { return null; } public static void setObjectField(Object obj, String field, Object value) {} public static Object callMethod(Object obj, String method, Object... args) { return null; } public static Object callStaticMethod(Class<?> clazz, String method, Object... args) { return null; } public static Class<?> findClass(String className, ClassLoader cl) { return null; } public static Object findAndHookMethod(Class<?> clazz, String methodName, Object... paramTypes) { return null; } }" >> stub/de/robv/android/xposed/XposedHelpers.java
          echo "package de.robv.android.xposed.callbacks;" > stub/de/robv/android/xposed/callbacks/XC_LoadPackage.java
          echo "package de.robv.android.xposed;" > stub/de/robv/android/xposed/callbacks/package.java
          echo "package de.robv.android.xposed.callbacks; import de.robv.android.xposed.*; public class XC_LoadPackage { public static class LoadPackageParam { public String packageName; } }" > stub/de/robv/android/xposed/callbacks/XC_LoadPackage.java
          cd stub && find . -name "*.java" | xargs javac -d .. && cd .. && jar cf app/libs/XposedBridgeAPI.jar de/robv/android/xposed/*.class de/robv/android/xposed/callbacks/*.class 2>/dev/null
          echo "Created stub XposedBridgeAPI.jar"
        fi
        ls -la app/libs/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Debug)
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: FakeNetType-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
