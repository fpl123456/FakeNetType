name: Build FakeNetType APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download XposedBridgeAPI.jar
      run: |
        mkdir -p app/libs
        curl -L -o app/libs/XposedBridgeAPI.jar \
          https://github.com/rovo89/XposedBridge/raw/art/api/XposedBridgeApi.jar \
          || echo "Download failed, using stub"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease --no-daemon || ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FakeNetType-APK
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: error
